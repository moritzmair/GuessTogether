<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuessTogether</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }
      button {
        background: #4ade80; color: #111; border: none; padding: 12px 24px;
        border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
        width: 100%; margin-top: 8px;
      }
      button:hover { background: #22c55e; }
      button:disabled { background: #555; color: #888; cursor: not-allowed; }
      input {
        width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
        background: #222; color: #eee; font-size: 1rem; margin-top: 8px;
      }
      .card {
        background: #1a1a1a; border-radius: 12px; padding: 24px;
        max-width: 420px; margin: 0 auto;
      }
      h1 { font-size: 1.6rem; margin-bottom: 16px; text-align: center; }
      h2 { font-size: 1.2rem; margin-bottom: 12px; }
      label { font-size: 0.85rem; color: #aaa; }
      .error { color: #f87171; font-size: 0.9rem; margin-top: 8px; }
      .center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
